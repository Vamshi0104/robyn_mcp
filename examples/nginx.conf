server {
    listen 443 ssl http2;
    server_name mcp.example.com;

    location /mcp {
        proxy_pass http://robyn_mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Auth-Sub $jwt_claim_sub;
        proxy_set_header X-Tenant-Id $jwt_claim_tenant_id;
        proxy_set_header X-Client-Id $jwt_claim_azp;
        proxy_set_header X-Auth-Scopes $jwt_claim_scope;
    }
}

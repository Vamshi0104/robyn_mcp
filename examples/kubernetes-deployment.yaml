apiVersion: apps/v1
kind: Deployment
metadata:
  name: robyn-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: robyn-mcp
  template:
    metadata:
      labels:
        app: robyn-mcp
    spec:
      containers:
        - name: robyn-mcp
          image: ghcr.io/your-org/robyn-mcp:latest
          ports:
            - containerPort: 8080
          env:
            - name: ROBYN_MCP_PATH
              value: /mcp
            - name: ROBYN_MCP_PROTOCOL_VERSION
              value: "2025-11-25"
---
apiVersion: v1
kind: Service
metadata:
  name: robyn-mcp
spec:
  selector:
    app: robyn-mcp
  ports:
    - port: 80
      targetPort: 8080
